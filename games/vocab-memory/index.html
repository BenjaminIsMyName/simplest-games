<!DOCTYPE html>
<html lang="he" dir="rtl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>משחק זיכרון למילים באנגלית</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <main class="app-shell">
            <section class="hero">
                <div class="hero-brand">
                    <img
                        class="hero-logo"
                        src="mpg-logo.png"
                        alt="לוגו מכללת MPG"
                    />
                    <div class="hero-text">
                        <p class="eyebrow">English + Hebrew Vocabulary</p>
                        <h1>משחק זיכרון למילים שחשוב להכיר לפני הקורס</h1>
                        <p class="hero-copy">
                            כל זוג כולל כרטיס אחד באנגלית וכרטיס אחד בעברית.
                            הופכים, מוצאים התאמות, ומתרגלים את המילים בדרך
                            כיפית.
                        </p>
                    </div>
                </div>
            </section>

            <section class="controls-panel" aria-label="הגדרות משחק">
                <label class="control">
                    <span>רמת משחק</span>
                    <select id="difficulty">
                        <option value="6">קל - 6 זוגות</option>
                        <option value="8" selected>בינוני - 8 זוגות</option>
                        <option value="12">מאתגר - 12 זוגות</option>
                        <option value="26">מלא - כל המילים</option>
                    </select>
                </label>

                <button id="restartButton" class="primary-button" type="button">
                    ערבוב חדש
                </button>
            </section>

            <section class="stats-panel" aria-label="סטטיסטיקות">
                <div class="stat-card">
                    <span class="stat-label">מהלכים</span>
                    <strong id="movesValue">0</strong>
                </div>
                <div class="stat-card">
                    <span class="stat-label">זוגות שנמצאו</span>
                    <strong id="matchesValue">0</strong>
                </div>
                <div class="stat-card">
                    <span class="stat-label">זוגות שנותרו</span>
                    <strong id="remainingValue">0</strong>
                </div>
            </section>

            <p id="statusMessage" class="status-message" aria-live="polite">
                בחרו שני כרטיסים ונסו לחבר בין המילה באנגלית לתרגום שלה.
            </p>

            <section
                id="memoryBoard"
                class="memory-board"
                aria-label="לוח משחק זיכרון"
            ></section>
        </main>

        <script src="script.js"></script>
    </body>
</html>
