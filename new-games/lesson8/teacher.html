<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סייבר-ספייס II (גרסת מורה מאושרת) - Xonix</title>
    
    <style>
        body { background-color: #0b0c10; color: #c5c6c7; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 10px; overflow: hidden; }
        h1 { font-size: 32px; color: #66fcf1; text-shadow: 0 0 10px rgba(102, 252, 241, 0.5); margin-bottom: 5px; }
        
        /* לוח הבקרה - לכאן ניכנס בשיעור 8! */
        #dashboard { background-color: #1f2833; border: 3px solid #45a29e; border-radius: 10px; width: 90%; max-width: 900px; margin: 0 auto 15px auto; padding: 10px; display: flex; justify-content: space-around; box-shadow: 0 0 20px rgba(69, 162, 158, 0.2); }
        .dash-box { font-size: 18px; font-weight: bold; }
        .dash-val { font-size: 26px; color: #66fcf1; display: block; margin-top: 3px; }
        .val-danger { color: #ff4757; }
        
        /* אזור המשחק */
        #game-container { position: relative; width: 900px; margin: 0 auto; outline: none; }
        canvas { background-color: #000; border: 4px solid #66fcf1; border-radius: 5px; box-shadow: 0 0 30px rgba(102, 252, 241, 0.3); display: block; margin: 0 auto; }
        
        .instructions { font-size: 14px; color: #8a8a8a; margin-top: 10px; }
        
        /* מסך סיום */
        #overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); flex-direction: column; justify-content: center; align-items: center; border-radius: 5px; z-index: 10; }
        #overlay h2 { font-size: 50px; color: #ff4757; margin: 0; text-shadow: 0 0 15px #ff4757; }
        #overlay button { margin-top: 25px; padding: 15px 35px; font-size: 22px; background-color: #66fcf1; color: #0b0c10; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; box-shadow: 0 5px #45a29e; }
        #overlay button:hover { background-color: #45a29e; transform: translateY(-2px); }
    </style>
</head>
<body>

    <h1>🌐 סייבר-ספייס II: נקמת הווירוסים 🌐</h1>

    <div id="dashboard">
        <div class="dash-box">
            שטח שנוקה:
            <span class="dash-val"><span id="percentDisplay">0</span>% / 80%</span>
        </div>
        <div class="dash-box">
            ניקוד מצטבר:
            <span class="dash-val" id="scoreDisplay">0</span>
        </div>
        <div class="dash-box">
            חיים:
            <span class="dash-val val-danger" id="livesDisplay">3</span>
        </div>
    </div>

    <div id="game-container" tabindex="0">
        <canvas id="gameCanvas" width="900" height="600"></canvas>
        <div id="overlay">
            <h2 id="msgText">המערכת נפרצה!</h2>
            <button onclick="resetGame()">טען מערכת מחדש</button>
        </div>
    </div>
    
    <p class="instructions">חצים לתזוזה | סגרו שטחים כדי לנקותם | היזהרו מווירוסי ה-👾!</p>

    <script>
        // ==========================================
        // 1. פונקציות שיעור 8 (DOM, אופרטורים ופונקציות)
        // את האזור הזה התלמידים יכתבו בעצמם בגרסה שלהם!
        // ==========================================
        
        let totalSeaBlocks = 0; // יחושב בתחילת המשחק
        let totalCaptured = 0;
        let score = 0;
        let lives = 3;

        // פונקציה לחישוב שטח ועדכון לוח הבקרה
        function processAreaCapture(newBlocksCount) {
            // אופרטור חיבור ועדכון ניקוד
            let pointsEarned = newBlocksCount * 10;
            score = score + pointsEarned;
            document.getElementById("scoreDisplay").innerText = score;

            // עדכון שטח לכוד (אופרטור חיבור, חילוק וכפל לאחוזים)
            totalCaptured = totalCaptured + newBlocksCount;
            let percentage = (totalCaptured / totalSeaBlocks) * 100;
            document.getElementById("percentDisplay").innerText = Math.floor(percentage);

            playSound('capture');

            // בדיקת ניצחון
            if (percentage >= 80) {
                gameWon();
            }
        }

        // פונקציה להורדת חיים בעת פסילה
        function processDeath() {
            lives = lives - 1; // אופרטור חיסור
            document.getElementById("livesDisplay").innerText = lives;
            playSound('fail');

            if (lives <= 0) {
                gameOver();
            }
        }

        // ==========================================
        // 2. מערכת סאונד (Web Audio API)
        // ==========================================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); if (audioCtx.state === 'suspended') audioCtx.resume(); }

        function playSound(type) {
            initAudio(); const o = audioCtx.createOscillator(); const g = audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination);
            if (type === 'capture') {
                o.type = 'sine'; o.frequency.setValueAtTime(600, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                o.start(); o.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'fail') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, audioCtx.currentTime); o.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.4);
                g.gain.setValueAtTime(0.2, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                o.start(); o.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'win') {
                o.type = 'square'; o.frequency.setValueAtTime(400, audioCtx.currentTime); o.frequency.setValueAtTime(600, audioCtx.currentTime + 0.1); o.frequency.setValueAtTime(800, audioCtx.currentTime + 0.2);
                g.gain.setValueAtTime(0.15, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                o.start(); o.stop(audioCtx.currentTime + 0.6);
            }
        }

        // ==========================================
        // 3. מנוע המשחק (Xonix / Qix Engine)
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');

        const TILE_SIZE = 15;
        const COLS = canvas.width / TILE_SIZE; 
        const ROWS = canvas.height / TILE_SIZE; 
        
        let grid = [];
        let enemies = [];
        let player = { c: 0, r: 0, dc: 0, dr: 0, wasInSea: false };
        let isGameOver = false;
        let lastTime = 0;
        let moveTimer = 0;
        let animationFrame = 0; // מונה לאפקטים ויזואליים

        function initGrid() {
            grid = [];
            totalSeaBlocks = 0;
            totalCaptured = 0;
            for (let r = 0; r < ROWS; r++) {
                grid[r] = [];
                for (let c = 0; c < COLS; c++) {
                    if (r <= 1 || r >= ROWS - 2 || c <= 1 || c >= COLS - 2) {
                        grid[r][c] = 1; // יבשה
                    } else {
                        grid[r][c] = 0; // ים
                        totalSeaBlocks++;
                    }
                }
            }
        }

        function initLevel() {
            player = { c: COLS/2, r: 1, dc: 0, dr: 0, wasInSea: false };
            enemies = [];
            // יצירת ווירוסים
            for(let i=0; i<3; i++) {
                enemies.push({ 
                    x: 10 + Math.random() * (COLS - 20), 
                    y: 10 + Math.random() * (ROWS - 20), 
                    dx: (Math.random()*0.4 + 0.2) * (Math.random()>0.5?1:-1), 
                    dy: (Math.random()*0.4 + 0.2) * (Math.random()>0.5?1:-1),
                    pulseOffset: Math.random() * Math.PI * 2 // אופסט לאפקט הפולס
                });
            }
        }

        function startGame() {
            score = 0; lives = 3;
            document.getElementById("scoreDisplay").innerText = score;
            document.getElementById("livesDisplay").innerText = lives;
            document.getElementById("percentDisplay").innerText = "0";
            
            initGrid();
            initLevel();
            isGameOver = false;
            document.getElementById('overlay').style.display = 'none';
            container.focus();
            requestAnimationFrame(gameLoop);
        }

        function resetGame() { startGame(); }
        function gameOver() { isGameOver = true; document.getElementById('msgText').innerText = "המערכת נפרצה!"; document.getElementById('msgText').style.color = "#ff4757"; document.getElementById('overlay').style.display = 'flex'; }
        function gameWon() { isGameOver = true; playSound('win'); document.getElementById('msgText').innerText = "המערכת נוקתה ב-100%!"; document.getElementById('msgText').style.color = "#2ed573"; document.getElementById('overlay').style.display = 'flex'; }

        // Flood Fill
        function fillCapturedArea() {
            let tempGrid = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            let queue = [];
            
            enemies.forEach(e => {
                let ec = Math.floor(e.x), er = Math.floor(e.y);
                if (er>=0 && er<ROWS && ec>=0 && ec<COLS && grid[er][ec] === 0) {
                    if(tempGrid[er][ec] === 0) { queue.push({r: er, c: ec}); tempGrid[er][ec] = 1; }
                }
            });

            while(queue.length > 0) {
                let curr = queue.shift();
                let dirs = [[0,1], [0,-1], [1,0], [-1,0]];
                for(let d of dirs) {
                    let nr = curr.r + d[0], nc = curr.c + d[1];
                    if(nr>=0 && nr<ROWS && nc>=0 && nc<COLS) {
                        if(grid[nr][nc] === 0 && tempGrid[nr][nc] === 0) { tempGrid[nr][nc] = 1; queue.push({r: nr, c: nc}); }
                    }
                }
            }

            let newLand = 0;
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if ((grid[r][c] === 0 && tempGrid[r][c] === 0) || grid[r][c] === 2) {
                        grid[r][c] = 1; newLand++;
                    }
                }
            }
            return newLand;
        }

        function die() {
            processDeath();
            if(isGameOver) return;
            for (let r = 0; r < ROWS; r++) { for (let c = 0; c < COLS; c++) { if(grid[r][c] === 2) grid[r][c] = 0; } }
            player = { c: COLS/2, r: 1, dc: 0, dr: 0, wasInSea: false };
        }

        container.addEventListener('keydown', (e) => {
            if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
            if(isGameOver) return;
            // מונע סיבוב של 180 מעלות בתוך הים (שלא יפסול את עצמו)
            if (e.code === 'ArrowUp' && player.dr !== 1) { player.dc = 0; player.dr = -1; }
            if (e.code === 'ArrowDown' && player.dr !== -1) { player.dc = 0; player.dr = 1; }
            if (e.code === 'ArrowLeft' && player.dc !== 1) { player.dc = -1; player.dr = 0; }
            if (e.code === 'ArrowRight' && player.dc !== -1) { player.dc = 1; player.dr = 0; }
        });

        function update(dt) {
            animationFrame++;
            moveTimer += dt;
            
            // עדכון אויבים
            enemies.forEach(e => {
                let currR = Math.floor(e.y), currC = Math.floor(e.x);
                if(grid[currR] && grid[currR][currC] === 2) die();

                let nextC = Math.floor(e.x + e.dx);
                if (nextC < 0 || nextC >= COLS || grid[currR][nextC] === 1) e.dx *= -1;
                
                let nextR = Math.floor(e.y + e.dy);
                if (nextR < 0 || nextR >= ROWS || grid[nextR][currC] === 1) e.dy *= -1;
                
                e.x += e.dx; e.y += e.dy;
                if (Math.abs(e.x - player.c) < 1 && Math.abs(e.y - player.r) < 1 && grid[player.r][player.c] !== 1) die();
            });

            // תנועת שחקן
            if (moveTimer > 35) { // מהירות מוגברת קצת
                moveTimer = 0;
                if (player.dc !== 0 || player.dr !== 0) {
                    let nextC = player.c + player.dc;
                    let nextR = player.r + player.dr;

                    if (nextC >= 0 && nextC < COLS && nextR >= 0 && nextR < ROWS) {
                        let target = grid[nextR][nextC];
                        if (target === 2) {
                            die();
                        } else if (target === 1) {
                            if (player.wasInSea) { player.wasInSea = false; processAreaCapture(fillCapturedArea()); }
                            player.c = nextC; player.r = nextR; player.dc = 0; player.dr = 0;
                        } else if (target === 0) {
                            player.wasInSea = true; player.c = nextC; player.r = nextR; grid[nextR][nextC] = 2;
                        }
                    } else { player.dc = 0; player.dr = 0; }
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // רקע - רשת סייברית עדינה
            ctx.strokeStyle = '#121a21'; ctx.lineWidth = 1;
            for(let i=0; i<COLS; i++) { ctx.beginPath(); ctx.moveTo(i*TILE_SIZE, 0); ctx.lineTo(i*TILE_SIZE, canvas.height); ctx.stroke(); }
            for(let i=0; i<ROWS; i++) { ctx.beginPath(); ctx.moveTo(0, i*TILE_SIZE); ctx.lineTo(canvas.width, i*TILE_SIZE); ctx.stroke(); }

            // ציור הגריד
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c] === 1) { // יבשה מנורמלת
                        // אפקט מילוי דיגיטלי
                        ctx.fillStyle = '#1f2833'; ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        ctx.fillStyle = 'rgba(69, 162, 158, 0.3)'; ctx.fillRect(c * TILE_SIZE + 2, r * TILE_SIZE + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                        ctx.strokeStyle = '#0b0c10'; ctx.lineWidth = 1; ctx.strokeRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    } else if (grid[r][c] === 2) { // שובל השחקן
                        ctx.fillStyle = '#66fcf1'; ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        // אפקט זוהר לשובל
                        ctx.shadowColor = '#66fcf1'; ctx.shadowBlur = 10; ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE); ctx.shadowBlur = 0;
                    }
                }
            }

            // ציור אויבים (וירוסים 👾)
            enemies.forEach(e => {
                // אפקט פולס לגודל
                let pulse = Math.sin(animationFrame * 0.1 + e.pulseOffset) * 2;
                let radius = (TILE_SIZE / 2.2) + pulse;

                // אפקט הבהוב צבע (אדום/שחור)
                ctx.fillStyle = (Math.floor(animationFrame * 0.2) % 2 === 0) ? '#ff4757' : '#000';
                ctx.beginPath();
                ctx.arc(e.x * TILE_SIZE + TILE_SIZE/2, e.y * TILE_SIZE + TILE_SIZE/2, Math.max(2, radius), 0, Math.PI * 2);
                ctx.fill();
                
                // ציור האימוג'י מעל העיגול
                ctx.fillStyle = '#fff'; ctx.font = '16px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText('👾', e.x * TILE_SIZE + TILE_SIZE/2, e.y * TILE_SIZE + TILE_SIZE/2);
            });

            // ציור השחקן (רובוט 🤖)
            let pc = player.c * TILE_SIZE;
            let pr = player.r * TILE_SIZE;
            
            // בסיס הרובוט
            ctx.fillStyle = '#c5c6c7'; ctx.fillRect(pc, pr, TILE_SIZE, TILE_SIZE);
            
            // אפקט "גלו" כחול רוטט מסביב
            ctx.shadowColor = '#66fcf1'; ctx.shadowBlur = 15 + Math.sin(animationFrame * 0.3) * 5;
            ctx.strokeStyle = '#66fcf1'; ctx.lineWidth = 2; ctx.strokeRect(pc, pr, TILE_SIZE, TILE_SIZE);
            ctx.shadowBlur = 0; // כיבוי הגלו לשאר הציורים

            // ציור האימוג'י
            ctx.fillStyle = '#fff'; ctx.font = '14px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText('🤖', pc + TILE_SIZE/2, pr + TILE_SIZE/2 + 1);
        }

        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let dt = timestamp - lastTime; lastTime = timestamp;
            update(dt); draw();
            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        startGame();

    </script>
</body>
</html>
