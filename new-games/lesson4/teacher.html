<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>טסט משחקיות - זירת הרובוטים</title>
    
    <style>
        body { background-color: #1a1a24; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; }
        h1 { color: #3498db; margin-top: 30px;}
        #game-container { margin: 0 auto; width: 900px; }
        canvas { background-color: #0a0a10; border: 4px solid #3498db; border-radius: 10px; cursor: crosshair; box-shadow: 0 0 20px rgba(52, 152, 219, 0.3); }
        .instructions { color: #bdc3c7; font-size: 18px; margin-bottom: 20px;}
    </style>
</head>
<body>

    <h1>🤖 זירת הרובוטים - גרסת בדיקה 🤖</h1>
    
    <div id="game-container">
        <p class="instructions">זזים עם <b>WASD או חצים</b> | מכוונים ויורים עם <b>העכבר</b> | הצילו את הריבועים הכחולים והשמידו את העיגולים האדומים!</p>
        <canvas id="gameCanvas" width="900" height="500"></canvas>
    </div>

    <script>
        // --- מערכת צלילים ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            if (!audioCtx) initAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'shoot') {
                // צליל יריה - קול חד
                osc.type = 'square';
                gain.gain.value = 0.03;
                const now = audioCtx.currentTime;
                osc.frequency.setValueAtTime(1000, now);
                osc.frequency.exponentialRampToValueAtTime(500, now + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                osc.start();
                osc.stop(now + 0.1);

            } else if (type === 'hitEnemy') {
                // צליל פגיעה אויב - קול עליז
                osc.type = 'sine';
                gain.gain.value = 0.05;
                const now = audioCtx.currentTime;
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.setValueAtTime(1200, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start();
                osc.stop(now + 0.15);

            } else if (type === 'rescueWorker') {
                // צליל הצלת עובד - תווים עולים
                osc.type = 'sine';
                gain.gain.value = 0.05;
                const now = audioCtx.currentTime;
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.setValueAtTime(900, now + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                osc.start();
                osc.stop(now + 0.2);

            } else if (type === 'loseLife') {
                // צליל הפסד חיים - קול יורד
                osc.type = 'sine';
                gain.gain.value = 0.06;
                const now = audioCtx.currentTime;
                osc.frequency.setValueAtTime(500, now);
                osc.frequency.setValueAtTime(250, now + 0.15);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                osc.start();
                osc.stop(now + 0.25);

            } else if (type === 'gameOver') {
                // צליל סיום משחק - קול דרמטי
                osc.type = 'sawtooth';
                gain.gain.value = 0.04;
                const now = audioCtx.currentTime;
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(80, now + 0.5);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start();
                osc.stop(now + 0.5);
            }
        }

        // בגרסת הטסט אנחנו מכניסים את העיצוב ידנית כדי לעקוף את הבדיקה
        let styles = { bossColor: '#f1c40f', enemyColor: '#e74c3c', workerColor: '#3498db', bossW: 80, workerW: 40 };

        // --- מנוע משחק: Top-Down Shooter ---
        let canvas, ctx;
        let player = { x: 450, y: 250, speed: 6, vx: 0, vy: 0 };
        let bullets = [];
        let enemies = [];
        let workers = [];
        let score = 0;
        let lives = 3;
        let isGameOver = false;
        let keys = {};
        let mouse = { x: 0, y: 0 };
        let animationId;

        // מפעיל את המשחק מיד בעליית העמוד
        window.onload = startGame;

        function startGame() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            player.w = styles.bossW;
            player.h = styles.bossW;
            player.x = canvas.width / 2 - player.w / 2;
            player.y = canvas.height / 2 - player.h / 2;

            document.addEventListener('keydown', e => keys[e.code] = true);
            document.addEventListener('keyup', e => keys[e.code] = false);
            
            // מעקב עכבר
            canvas.addEventListener('mousemove', e => {
                const rect = canvas.getBoundingClientRect();
                mouse.x = e.clientX - rect.left;
                mouse.y = e.clientY - rect.top;
            });

            // ירייה
            canvas.addEventListener('mousedown', () => {
                if(isGameOver) return;
                playSound('shoot');
                const angle = Math.atan2(mouse.y - (player.y + player.h/2), mouse.x - (player.x + player.w/2));
                bullets.push({
                    x: player.x + player.w/2,
                    y: player.y + player.h/2,
                    vx: Math.cos(angle) * 15,
                    vy: Math.sin(angle) * 15,
                    radius: 6
                });
            });

            document.addEventListener('keydown', e => {
                if(e.code === 'Enter' && isGameOver) resetGame();
            });

            setInterval(() => { if(!isGameOver) spawnEnemy(); }, 1200);
            setInterval(() => { if(!isGameOver) spawnWorker(); }, 3500);

            animationId = requestAnimationFrame(update);
        }

        function resetGame() {
            score = 0; lives = 3; enemies = []; bullets = []; workers = [];
            player.x = canvas.width/2 - player.w/2;
            player.y = canvas.height/2 - player.h/2;
            isGameOver = false;
            cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(update);
        }

        function spawnEnemy() {
            let x, y;
            if(Math.random() > 0.5) { x = Math.random() > 0.5 ? -40 : canvas.width + 40; y = Math.random() * canvas.height; } 
            else { x = Math.random() * canvas.width; y = Math.random() > 0.5 ? -40 : canvas.height + 40; }
            enemies.push({ x: x, y: y, radius: styles.workerW / 2, speed: 2 + Math.random() * 2 });
        }

        function spawnWorker() {
            workers.push({ x: 50 + Math.random() * (canvas.width-100), y: 50 + Math.random() * (canvas.height-100), w: styles.workerW, life: 400 });
        }

        function update() {
            if(isGameOver) return;

            // תזוזת שחקן
            if (keys['KeyA'] || keys['ArrowLeft']) player.x -= player.speed;
            if (keys['KeyD'] || keys['ArrowRight']) player.x += player.speed;
            if (keys['KeyW'] || keys['ArrowUp']) player.y -= player.speed;
            if (keys['KeyS'] || keys['ArrowDown']) player.y += player.speed;

            // גבולות
            if(player.x < 0) player.x = 0;
            if(player.x + player.w > canvas.width) player.x = canvas.width - player.w;
            if(player.y < 0) player.y = 0;
            if(player.y + player.h > canvas.height) player.y = canvas.height - player.h;

            // יריות
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].x += bullets[i].vx;
                bullets[i].y += bullets[i].vy;
                if(bullets[i].x < 0 || bullets[i].x > canvas.width || bullets[i].y < 0 || bullets[i].y > canvas.height) {
                    bullets.splice(i, 1);
                }
            }

            // אויבים
            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                let angle = Math.atan2((player.y + player.h/2) - e.y, (player.x + player.w/2) - e.x);
                e.x += Math.cos(angle) * e.speed;
                e.y += Math.sin(angle) * e.speed;

                let distX = Math.abs(e.x - (player.x + player.w/2));
                let distY = Math.abs(e.y - (player.y + player.h/2));
                if(distX < player.w/2 + e.radius && distY < player.h/2 + e.radius) {
                    playSound('loseLife');
                    lives--;
                    enemies.splice(i, 1);
                    if(lives <= 0) {
                        isGameOver = true;
                        setTimeout(() => playSound('gameOver'), 100);
                    }
                    continue;
                }

                for(let j = bullets.length - 1; j >= 0; j--) {
                    let b = bullets[j];
                    let dist = Math.sqrt(Math.pow(b.x - e.x, 2) + Math.pow(b.y - e.y, 2));
                    if(dist < e.radius + b.radius) {
                        playSound('hitEnemy');
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        score += 10;
                        break;
                    }
                }
            }

            // פועלים
            for (let i = workers.length - 1; i >= 0; i--) {
                let w = workers[i];
                w.life--;
                if(w.life <= 0) { workers.splice(i, 1); continue; }

                if(player.x < w.x + w.w && player.x + player.w > w.x &&
                   player.y < w.y + w.w && player.y + player.h > w.y) {
                    playSound('rescueWorker');
                    workers.splice(i, 1);
                    score += 50;
                }
            }

            draw();
            animationId = requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // גריד רקע
            ctx.strokeStyle = "rgba(44, 62, 80, 0.5)";
            ctx.lineWidth = 1;
            for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
            for(let i=0; i<canvas.height; i+=40) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }

            // פועלים להצלה
            workers.forEach(w => {
                ctx.fillStyle = styles.workerColor;
                ctx.globalAlpha = w.life / 400; 
                ctx.fillRect(w.x, w.y, w.w, w.w);
                ctx.globalAlpha = 1.0;
            });

            // השחקן עצמו
            ctx.fillStyle = styles.bossColor;
            ctx.fillRect(player.x, player.y, player.w, player.h);
            
            // עין מכוונת עכבר
            let eyeAngle = Math.atan2(mouse.y - (player.y + player.h/2), mouse.x - (player.x + player.w/2));
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(player.x + player.w/2 + Math.cos(eyeAngle)*20, player.y + player.h/2 + Math.sin(eyeAngle)*20, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = "black";
            ctx.beginPath(); ctx.arc(player.x + player.w/2 + Math.cos(eyeAngle)*22, player.y + player.h/2 + Math.sin(eyeAngle)*22, 5, 0, Math.PI*2); ctx.fill();

            // אויבים
            enemies.forEach(e => {
                ctx.fillStyle = styles.enemyColor;
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.beginPath(); ctx.arc(e.x - 5, e.y - 5, 3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.arc(e.x + 5, e.y - 5, 3, 0, Math.PI*2); ctx.fill();
            });

            // יריות
            ctx.fillStyle = "#f1c40f";
            bullets.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, b.radius, 0, Math.PI*2); ctx.fill();
            });

            // UI
            ctx.fillStyle = "#ecf0f1";
            ctx.font = "bold 26px Tahoma";
            ctx.textAlign = "right";
            ctx.fillText("נקודות: " + score, canvas.width - 20, 40);
            ctx.textAlign = "left";
            ctx.fillStyle = "#e74c3c";
            ctx.fillText("חיים: " + "❤️".repeat(lives), 20, 40);

            if(isGameOver) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#e74c3c";
                ctx.textAlign = "center";
                ctx.font = "bold 70px Tahoma";
                ctx.fillText("הזירה קרסה!", canvas.width / 2, canvas.height / 2 - 20);
                ctx.fillStyle = "#ffffff";
                ctx.font = "28px Tahoma";
                ctx.fillText("הגעתם ל- " + score + " נקודות", canvas.width / 2, canvas.height / 2 + 30);
                ctx.fillText("לחצו ENTER למשחק חדש", canvas.width / 2, canvas.height / 2 + 80);
                ctx.textAlign = "left";
            }
        }
    </script>
</body>
</html>
