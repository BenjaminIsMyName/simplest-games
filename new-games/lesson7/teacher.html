<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מלך הפלאפל - האימפריה!</title>
    
    <style>
        body { background-color: #f39c12; color: #2c3e50; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 10px; }
        h1 { font-size: 38px; color: #d35400; text-shadow: 2px 2px 0px #f1c40f, 3px 3px 0px #fff; margin-bottom: 5px; }
        
        #game-board { background-color: #fff; border-radius: 20px; width: 95%; max-width: 900px; margin: 0 auto; padding: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.2); border: 5px solid #e67e22; display: flex; flex-direction: column; gap: 15px; }
        
        /* לוח קופה וחנות */
        .top-panel { display: flex; justify-content: space-between; align-items: center; background-color: #ecf0f1; padding: 15px; border-radius: 15px; border: 2px dashed #bdc3c7; }
        .money-board { font-size: 28px; font-weight: bold; background-color: #27ae60; color: white; padding: 10px 20px; border-radius: 10px; box-shadow: 0 4px #2ecc71; border: 2px solid #219653; }
        .store-area { display: flex; gap: 10px; align-items: center; }
        .store-btn { font-size: 16px; font-weight: bold; padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; transition: 0.2s; color: white; }
        .store-btn:disabled { background-color: #95a5a6; cursor: not-allowed; opacity: 0.6; }
        #buyTahiniBtn { background-color: #f1c40f; color: #333; }
        #buyPicklesBtn { background-color: #16a085; }

        /* אזור הלקוח */
        .customer-area { display: flex; align-items: center; justify-content: center; gap: 20px; background-color: #fdfefe; padding: 15px; border-radius: 15px; border: 2px solid #ecf0f1; }
        .customer-emoji { font-size: 70px; }
        .speech-bubble { background-color: white; border: 3px solid #bdc3c7; border-radius: 15px; padding: 15px 20px; font-size: 20px; font-weight: bold; position: relative; box-shadow: 0 4px rgba(0,0,0,0.05); max-width: 60%; }
        .speech-bubble::before { content: ''; position: absolute; right: -15px; top: 50%; transform: translateY(-50%); border-width: 15px 0 15px 15px; border-style: solid; border-color: transparent transparent transparent white; }
        .speech-bubble::after { content: ''; position: absolute; right: -19px; top: 50%; transform: translateY(-50%); border-width: 17px 0 17px 17px; border-style: solid; border-color: transparent transparent transparent #bdc3c7; z-index: -1; }

        /* אזור הכנת הפיתה */
        .kitchen-area { display: flex; justify-content: space-around; align-items: flex-end; padding: 20px; background-color: #fdfefe; border-radius: 15px; border: 2px dashed #e67e22; }
        
        /* תיקון הפיתה: מוגדלת, מכילה overflow: hidden לחיתוך גבולות */
        .pita-container { 
            position: relative; 
            width: 250px; 
            height: 180px; 
            background-color: #f5cba7; 
            border-radius: 20px 20px 120px 120px; 
            border: 4px solid #d35400; 
            display: flex; 
            flex-wrap: wrap-reverse; 
            align-content: flex-start; 
            justify-content: center; 
            padding: 20px 20px 40px 20px; 
            box-sizing: border-box; 
            box-shadow: inset 0 -30px 30px rgba(211, 84, 0, 0.3); 
            overflow: hidden; /* זה הקסם שמשאיר הכל בתוך הפיתה */
        }
        .pita-title { position: absolute; top: -30px; font-weight: bold; color: #d35400; font-size: 18px; }
        
        /* הגדלת המרכיבים וסידור חכם שלהם */
        .ingredient { 
            font-size: 45px; 
            margin: -10px -5px; /* גורם להם לעלות אחד על השני קצת */
            animation: popIn 0.2s ease-out; 
            line-height: 1;
        }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        /* כפתורי פעולה במטבח */
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 350px; }
        .action-btn { font-size: 16px; font-weight: bold; padding: 15px 10px; border: none; border-radius: 10px; cursor: pointer; transition: 0.1s; color: white; box-shadow: 0 4px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; }
        .action-btn:active { transform: translateY(4px); box-shadow: 0 0 rgba(0,0,0,0.2); }
        .btn-falafel { background-color: #d35400; }
        .btn-salad { background-color: #27ae60; }
        .btn-tahini { background-color: #f1c40f; color: #333; display: none; }
        .btn-pickles { background-color: #16a085; display: none; }
        .btn-serve { background-color: #2980b9; font-size: 20px; grid-column: span 2; margin-top: 5px; }

        /* תצוגת משתנים עכשווית */
        .current-stats { display: flex; justify-content: space-around; font-size: 16px; font-weight: bold; margin-top: -5px; color: #7f8c8d; }
        .stat-tahini, .stat-pickles { display: none; }
    </style>
</head>
<body>

    <h1>🧆 מלך הפלאפל - האימפריה 🧆</h1>

    <div id="game-board">
        
        <div class="top-panel">
            <div class="money-board">
                קופה: <span id="moneyDisplay">0</span> ₪
            </div>
            <div class="store-area">
                <span style="font-weight: bold; color: #34495e;">שוק הכרמל:</span>
                <button id="buyTahiniBtn" class="store-btn" onclick="buyTahini()">קנה עמדת טחינה (100₪)</button>
                <button id="buyPicklesBtn" class="store-btn" onclick="buyPickles()">קנה עמדת חמוצים (500₪)</button>
            </div>
        </div>

        <div class="customer-area">
            <div id="customerEmoji" class="customer-emoji">🧔🏽‍♂️</div>
            <div class="speech-bubble" id="orderText">
                ברוך הבא למשמרת! לחץ על התחלה לקבלת לקוח.
            </div>
        </div>

        <div class="kitchen-area">
            
            <div class="actions">
                <button class="action-btn btn-falafel" onclick="addIngredient('falafel')">🧆 כדור פלאפל</button>
                <button class="action-btn btn-salad" onclick="addIngredient('salad')">🥗 כף סלט</button>
                <button id="btnTahini" class="action-btn btn-tahini" onclick="addIngredient('tahini')">🥣 זילוף טחינה</button>
                <button id="btnPickles" class="action-btn btn-pickles" onclick="addIngredient('pickles')">🥒 חופן חמוצים</button>
                
                <button class="action-btn btn-serve" onclick="servePita()">🛎️ הגש מנה ללקוח!</button>
            </div>

            <div>
                <div class="pita-title">הפיתה שלך:</div>
                <div id="pita" class="pita-container">
                    </div>
            </div>

        </div>

        <div class="current-stats">
            <span>🧆 כדורים: <span id="falafelCountDisplay" style="color:#d35400">0</span></span>
            <span>🥗 סלט: <span id="saladCountDisplay" style="color:#27ae60">0</span></span>
            <span id="tahiniStat" class="stat-tahini">🥣 טחינה: <span id="tahiniCountDisplay" style="color:#f39c12">0</span></span>
            <span id="picklesStat" class="stat-pickles">🥒 חמוצים: <span id="picklesCountDisplay" style="color:#16a085">0</span></span>
        </div>

    </div>

    <script>
        // ==========================================
        // 1. הגדרת משתני המשחק (Variables)
        // ==========================================
        
        let money = 0; 

        let hasTahini = false;
        let hasPickles = false;

        let pitaFalafel = 0;
        let pitaSalad = 0;
        let pitaTahini = 0;
        let pitaPickles = 0;
        
        let targetFalafel = 0;
        let targetSalad = 0;
        let targetTahini = 0;
        let targetPickles = 0;
        
        const customers = ["🧔🏽‍♂️", "👩🏼‍🦱", "👮🏻‍♂️", "👷🏽‍♀️", "👨🏻‍⚕️", "🥷🏽", "👵🏻", "👩🏽‍🏫"];

        // ==========================================
        // 2. מערכת סאונד
        // ==========================================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSound(type) {
            initAudio();
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            
            if (type === 'falafel') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, audioCtx.currentTime);
                o.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.1);
                g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                o.start(); o.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'salad' || type === 'tahini') {
                o.type = 'sine'; o.frequency.setValueAtTime(400, audioCtx.currentTime);
                o.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
                g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                o.start(); o.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'pickles') {
                o.type = 'triangle'; o.frequency.setValueAtTime(800, audioCtx.currentTime);
                o.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
                g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                o.start(); o.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'buy') {
                o.type = 'square'; o.frequency.setValueAtTime(1000, audioCtx.currentTime); o.frequency.setValueAtTime(1500, audioCtx.currentTime + 0.1);
                g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                o.start(); o.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'success') {
                o.type = 'sine'; o.frequency.setValueAtTime(600, audioCtx.currentTime); o.frequency.setValueAtTime(900, audioCtx.currentTime + 0.1);
                g.gain.setValueAtTime(0.15, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                o.start(); o.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'fail') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(150, audioCtx.currentTime); o.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.4);
                g.gain.setValueAtTime(0.2, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                o.start(); o.stop(audioCtx.currentTime + 0.4);
            }
        }

        // ==========================================
        // 3. לוגיקת החנות
        // ==========================================
        
        function buyTahini() {
            if (money >= 100 && !hasTahini) {
                money = money - 100;
                hasTahini = true;
                playSound('buy');
                document.getElementById('buyTahiniBtn').style.display = 'none';
                document.getElementById('btnTahini').style.display = 'flex';
                document.getElementById('tahiniStat').style.display = 'inline';
                updateDisplays();
            }
        }

        function buyPickles() {
            if (money >= 500 && !hasPickles) {
                money = money - 500;
                hasPickles = true;
                playSound('buy');
                document.getElementById('buyPicklesBtn').style.display = 'none';
                document.getElementById('btnPickles').style.display = 'flex';
                document.getElementById('picklesStat').style.display = 'inline';
                updateDisplays();
            }
        }

        function checkStoreStatus() {
            document.getElementById('buyTahiniBtn').disabled = (money < 100);
            document.getElementById('buyPicklesBtn').disabled = (money < 500);
        }

        // ==========================================
        // 4. לוגיקת המשחק
        // ==========================================

        function generateOrder() {
            document.getElementById('customerEmoji').innerText = customers[Math.floor(Math.random() * customers.length)];

            targetFalafel = Math.floor(Math.random() * 4) + 2; 
            targetSalad = Math.floor(Math.random() * 3);       
            targetTahini = hasTahini ? Math.floor(Math.random() * 2) : 0;   
            targetPickles = hasPickles ? Math.floor(Math.random() * 3) : 0; 

            let txt = `אני רוצה ${targetFalafel} כדורי פלאפל`;
            if (targetSalad > 0) txt += `, ${targetSalad} כפות סלט`;
            if (targetTahini > 0) txt += `, טחינה`;
            if (targetPickles > 0) txt += `, ו-${targetPickles} כפות חמוצים`;
            txt += ". תודה!";

            document.getElementById('orderText').innerText = txt;
            document.getElementById('orderText').style.borderColor = "#bdc3c7";
            
            clearPita();
        }

        function addIngredient(type) {
            const pita = document.getElementById('pita');
            const item = document.createElement('div');
            item.className = 'ingredient';

            if (type === 'falafel') {
                pitaFalafel++;
                item.innerText = '🧆';
            } else if (type === 'salad') {
                pitaSalad++;
                item.innerText = '🥗';
            } else if (type === 'tahini') {
                pitaTahini++;
                item.innerText = '🥣';
            } else if (type === 'pickles') {
                pitaPickles++;
                item.innerText = '🥒';
            }
            
            playSound(type);
            pita.appendChild(item);
            updateDisplays();
        }

        function servePita() {
            if (pitaFalafel === 0 && pitaSalad === 0 && pitaTahini === 0 && pitaPickles === 0) {
                alert("הפיתה ריקה! אי אפשר להגיש פיתה ריקה."); return;
            }

            if (pitaFalafel === targetFalafel && 
                pitaSalad === targetSalad && 
                pitaTahini === targetTahini && 
                pitaPickles === targetPickles) {
                
                let payment = 25;
                if (targetTahini > 0) payment += 15;
                if (targetPickles > 0) payment += 25;
                
                money = money + payment;
                playSound('success');
                document.getElementById('orderText').innerText = `מושלם! הנה ${payment} שקלים.`;
                document.getElementById('orderText').style.borderColor = "#27ae60";
                
                setTimeout(generateOrder, 1500);
            } else {
                playSound('fail');
                document.getElementById('orderText').innerText = "איכס! זה לא מה שביקשתי! תכין חדש!";
                document.getElementById('orderText').style.borderColor = "#e74c3c";
                setTimeout(clearPita, 1500);
            }
            
            updateDisplays();
        }

        function clearPita() {
            pitaFalafel = 0; pitaSalad = 0; pitaTahini = 0; pitaPickles = 0;
            document.getElementById('pita').innerHTML = '';
            updateDisplays();
        }

        function updateDisplays() {
            document.getElementById('falafelCountDisplay').innerText = pitaFalafel;
            document.getElementById('saladCountDisplay').innerText = pitaSalad;
            document.getElementById('tahiniCountDisplay').innerText = pitaTahini;
            document.getElementById('picklesCountDisplay').innerText = pitaPickles;
            document.getElementById('moneyDisplay').innerText = money;
            checkStoreStatus();
        }

        window.onload = () => {
            updateDisplays();
            setTimeout(generateOrder, 1000);
        };

    </script>
</body>
</html>
